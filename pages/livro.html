<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livro</title>
        
    <script defer src = "../javascript/components/clock.js"></script>
    <script defer src="../javascript/components/livro.js"></script>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/livro.css">
</head>
<body>

  <header>
    <section class="header-center">
      <h1>Rastreador de Leitura</h1>
      <time id="clock"></time>
      <a href="../index.html" id="voltarInicio">
          &larr; Início
      </a>
      <div class="header-right">
        <img class="user-icon" src="../assets/images/profile-user-icon-png.png">
      </div>
    </section>
  </header>

<main>
   <section class="card-infLivro">

    <div class="card-img">
      <img class="img-liv-aberto" src="../assets/images/icone-livro-estrela.png" alt="Livro aberto">
    </div>

    <div class="lado-direito">
      <div class="container-progresso">

          <div class="barra-progresso">
              <div class="progresso"></div>
          </div>

          <span id="porcentagem">0%</span>

      </div>

        <div class="dados-livro">

            <div class="campo titulo">
                <span class="label">Título:</span>
                <span class="valor" id="titulo"></span>
            </div>

            <div class="campo autor">
                <span class="label">Autor(a):</span>
                <span class="valor" id="autor"></span>
            </div>

            <div class="campo genero">
                <span class="label">Gênero:</span>
                <span id="genero"></span>
            </div>

            <div class="campo paginas">
                <span class="label">Quantidade de páginas:</span>
                <span id="qtdPag"></span>
            </div>

            <div class="campo inicio">
                <span>Data de início:</span>
                <span id="dtInicio"></span>
            </div>

            <div class="campo fim">
                <span class="label">Data de fim:</span>
                <span id="dtFim"></span>
            </div>

        </div>
        <div class="botoes">
          <button class="btn" id="botao-atualizar">Atualizar</button>
          <button class="btn" id="botao-remover">Remover</button>
          <button class="btn" id="botao-dicionarSessao">Adicionar Sessão</button>
        </div>
    </div>

</section>
<section class="card-opiniao">

    <button class="btn-opiniao" id="btnOpiniao">
        <span>&darr;</span>
        O que eu achei da leitura
        <span>&darr;</span>
    </button>

    <div class="conteudo-opiniao opnOculto" id="conteudoOpiniao">
        <div class="opiniao" id="opiniao"></div>
    </div>

</section>

<div id="listaSessoes"></div>
  </main>

    <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <img src="../assets/images/icons8-trash-50.png" alt="icon lixeira">
        <div class="modal-header-text">
          <p>Deletar livro</p>
          <p>Esta ação não poderá ser desfeita.</p>
        </div>
      </div>

      <p class="modal-msg">Tem certeza que deseja excluir esse livro?</p>

      <div class="botoes-modal">
        <button class="btn-modal" id="btn-cancelar-modal">Cancelar</button>
        <button class="btn-modal vermelho" id="btn-deletar">Deletar</button>
      </div>
    </div>
  </div>

  <footer>
  </footer>
</body>
    
</html>
