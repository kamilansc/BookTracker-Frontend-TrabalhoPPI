<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Leitura</title>

    <script defer src="javascript/components/clock.js"></script>
    <script type="module" src="javascript/pages/homepage.js"></script>
    <script defer src="javascript/components/tema.js"></script>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/homepage.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <div class="header-center">
            <h1>Rastreador de Leitura</h1>
            <time id="clock"></time>
        </div>

        <div class="header-right">
            <img class="user-icon" src="assets/images/profile-user-icon-png.png">
        </div>

        <div class="header-left">
            <i id="btnTema" class="bi bi-moon-stars-fill"></i>
        </div>

    </header>

    <main>
        <section class="last-session">
            <div class="session-header">
                <div class="session-title">
                    <div class="session-icon">
                        <img class="session-img-icon" src="assets\images\session-icon.png">
                    </div>
                    <h2>Última sessão registrada</h2>
                </div>

                <a href="index.html">
                    <img class="session-img-icon" src="assets\images\book-icon.png">
                </a>
            </div>

            <div class="session-info">
                <time id="session-date"></time>
                <p id="session-pages"></p>
            </div>

            <div class="session-user-comment">
                <p id="session-comment"></p>
            </div>
        </section>

        <section class="books">
            <div class="books-header">
                <h2>Meus Livros</h2>
                <div class="books-line"></div>
                <button id="botao-hp-adicionar-livro">Adicionar Livro</button>
            </div>

            <div class="books-grid" id="books-grid"></div>
        </section>
    </main>

    <div class="modal-overlay" id="form-adicionar-livro">
        <div class="modal adicionar">
            <div class="modal-header-adicionar">
                <div class="foto">
                    <img src="../assets/images/icons8-open-book.png" alt="icon livro aberto">
                </div>
                <div class="modal-header-text">
                    <p>Adicionar livro</p>
                    <p>Preencha as informações do livro.</p>
                </div>
            </div>
            <div>
                <form id="form-livro" class="form-livro">

                    <div class="campo2">
                        <label for="titulo">Título:</label>
                        <input type="text" id="titulo" name="titulo" required minlength="2" maxlength="255"
                            placeholder="Digite o título do livro">
                    </div>

                    <div class="campo2">
                        <label for="autor">Autor(a):</label>
                        <input type="text" id="autor" name="autor" required minlength="3" maxlength="255"
                            placeholder="Digite o nome do autor">
                    </div>

                    <div class="container-form">
                        <div class="campo2">
                            <label for="genero">Gênero:</label>

                            <select class="input" id="genero" name="genero" required>
                                <option value="">Selecione um gênero</option>
                                <option value="Ação">Ação</option>
                                <option value="Aventura">Aventura</option>
                                <option value="Autoajuda">Autoajuda</option>
                                <option value="Biografia">Biografia</option>
                                <option value="Ciência">Ciência</option>
                                <option value="Clássico">Clássico</option>
                                <option value="Comédia">Comédia</option>
                                <option value="Conto">Conto</option>
                                <option value="Drama">Drama</option>
                                <option value="Fantasia">Fantasia</option>
                                <option value="Ficção Científica">Ficção Científica</option>
                                <option value="Didádico">Didático</option>
                                <option value="Infantil">Infantil</option>
                                <option value="Mistério">Mistério</option>
                                <option value="Poesia">Poesia</option>
                                <option value="Romance">Romance</option>
                                <option value="Suspense">Suspense</option>
                                <option value="Terror">Terror</option>
                            </select>
                        </div>

                        <div class="campo2">
                            <label for="paginas">Quantidade de Pág.:</label>

                            <input class="input" type="number" id="paginas" name="qtdPaginas" required min="1"
                                max="100000" step="1" placeholder="Ex.: 320">
                        </div>

                    </div>


                    <div class="botoes-modal-adicionar">
                        <button type="button" id="btn-cancelar-adicao" class="btn-modal">
                            Cancelar
                        </button>

                        <button type="submit" id="btn-adicionar" class="btn-modal roxo">
                            Adicionar livro
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <p>Book Tracker • 2026</p>
    </footer>
</body>

</html>
