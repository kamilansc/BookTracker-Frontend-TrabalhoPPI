<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Leitura</title>

    <script defer src = "javascript/components/clock.js"></script>
    <script type="module" src = "javascript/pages/homepage.js"></script>
    <script defer src="javascript/components/tema.js"></script>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/homepage.css">  

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <div class="header-center">
            <h1>Rastreador de Leitura</h1>
            <time id="clock"></time>
        </div>

        <div class="header-right">
            <img class="user-icon" src="assets/images/profile-user-icon-png.png">
        </div>

        <div class="header-left"> 
            <i id="btnTema" class="bi bi-moon-stars-fill"></i> 
        </div>

    </header>

    <main>
        <section class="last-session">
            <div class="session-header">
                <div class="session-title">
                    <div class="session-icon">
                        <img class="session-img-icon" src="assets\images\session-icon.png">
                    </div>
                    <h2>Última sessão registrada</h2>
                </div>

                <a href="index.html">
                    <img class="session-img-icon" src="assets\images\book-icon.png">
                </a>
            </div>

            <div class="session-info">
                <time id="session-date"></time>
                <p id="session-pages"></p>
            </div>

            <div class="session-user-comment">
                <p id="session-comment"></p>
            </div>
        </section>

        <section class="books">
            <div class="books-header">
                <h2>Meus Livros</h2>
                <div class="books-line"></div>
                <button>Adicionar Livro</button>
            </div>

            <div class="books-grid" id="books-grid"></div>
        </section>
    </main>

    <footer>
        <p>Book Tracker • 2026</p>
    </footer>
</body>
</html>
